module: "03"
annotations:

  # --- Opening Hook (accordion, first annotation) ---
  - after: "executive-summary"
    component: accordion
    variant: supplementary-reference
    data:
      title: "The Friday afternoon refactor"
      content: "On a Friday at 4pm, a developer points Claude Code at a 300-file codebase and says: 'Refactor the authentication system to use JWT tokens instead of session cookies.' The agent reads the codebase, identifies 47 files that need changes, edits them in coordinated sequence, runs the test suite, fixes the 3 tests it broke, and pushes a clean PR -- in 22 minutes. The developer reviews the diff over coffee. This is the reality of single-agent systems in March 2026. But here is the question this module answers: how does it actually work? What happens when the agent hallucinates a file path? What stops it from deleting your database? And why does verification -- not generation -- determine whether agents succeed or fail?"

  # --- Curiosity Prompt: Agent Architecture ---
  - after: "how-agents-work-the-core-architecture"
    component: accordion
    variant: supplementary-reference
    data:
      title: "The one pattern that separates agents from chatbots"
      content: "The difference between a chatbot and an agent is a single architectural pattern. Once you see it, you cannot unsee it."

  # --- Concept Check: Gather-Act-Verify Loop ---
  - after: "the-gather-act-verify-loop"
    component: quiz
    variant: concept-check
    data:
      question: "In the gather-act-verify loop, what happens if the verification step is removed?"
      choices:
        - "The agent works faster with no quality loss"
        - "The agent produces results but cannot detect its own errors"
        - "The agent cannot execute tools"
        - "Nothing -- verification is optional"
      correct: 1
      explanation: "Verification catches hallucinated file paths, broken imports, failed tests, and logical errors. Without it, the agent is a 'code generator' not an 'agentic loop.' This is why the module states verification is architecturally non-negotiable."

  # --- Accordion: LATS advanced detail ---
  - after: "planning-strategies"
    component: accordion
    variant: advanced-detail
    data:
      title: "LATS: Language Agent Tree Search in depth"
      content: "LATS combines tree search with Monte Carlo evaluation. The agent explores multiple solution paths, backtracks from dead ends, and selects the most promising branches based on accumulated reward signals. Research shows LATS improves task completion by 22.1 percentage points over basic ReAct on HumanEval. The computational cost is significant -- each branch requires a full model call -- which is why LATS is not yet standard in consumer agents. However, its principles inform the design of systems like OpenAI's o-series reasoning models, which internalize the tree search within the model's extended thinking process (see Module 01 for reasoning mode details)."

  # --- Concept Check: Function Calling vs. MCP ---
  - after: "tool-use-function-calling-and-mcp"
    component: quiz
    variant: concept-check
    data:
      question: "What is the key difference between function calling and MCP for agent tool use?"
      choices:
        - "MCP is faster than function calling"
        - "Function calling supports more tools than MCP"
        - "MCP externalizes tool definitions into standalone servers discoverable by any MCP-compatible client"
        - "There is no practical difference"
      correct: 2
      explanation: "Function calling is for a single agent with a handful of known tools. MCP is for agents that connect to arbitrary external services at runtime. The MCP ecosystem includes 19,700+ servers. This concept was introduced in Module 00 and receives full treatment in Module 06."

