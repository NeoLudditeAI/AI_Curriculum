  # --- Worked Example: Sandboxing Strategy (partial/completion) ---
  - after: "platform-specific-approaches"
    component: worked-example
    variant: partial
    data:
      title: "Choosing a sandboxing strategy"
      problem: "Your team is building a coding agent that will execute user-submitted code. The code may install packages from npm. You need to balance security with the agent's ability to function."
      steps:
        - label: "Identify the threat model"
          content: "Untrusted code execution with network access needs. Users submit arbitrary code that may install npm packages, requiring both filesystem and network access."
        - label: "Why is Docker alone insufficient?"
          content: "[YOUR ANSWER] Think about what happens if the containerized process escapes the namespace isolation."
        - label: "Evaluate gVisor vs. Firecracker for this use case"
          content: "gVisor provides an application-level kernel intercepting system calls -- defense-in-depth beyond Docker. Firecracker provides full hardware-level isolation with dedicated kernels per task, booting in ~125ms with <5 MiB overhead."
        - label: "Select the isolation strategy and justify"
          content: "[YOUR ANSWER] Consider which strategy provides the strongest guarantee for untrusted code that needs network access."
      solution: "Docker is insufficient because container escapes give the attacker full host access -- the shared kernel is the vulnerability. For untrusted code with network access, Firecracker MicroVMs provide the strongest guarantee: each task gets its own kernel with hardware-level isolation, meaning even a successful exploit is contained to that VM. The ~125ms boot time and <5 MiB overhead make per-task VM creation practical. gVisor is a viable middle ground for trusted-but-sandboxed code, but for truly untrusted user submissions, Firecracker's isolation model is the appropriate choice."

  # --- Curiosity Prompt: Safety Models ---
  - after: "safety-models"
    component: accordion
    variant: supplementary-reference
    data:
      title: "Why safety is an engineering concern"
      content: "An unmonitored Opus 4.6 agent at maximum throughput costs $1,200 per hour. This is why safety is an engineering concern, not just an ethics discussion."

  # --- Self-Explanation: Layered Safety Model ---
  - after: "multi-layer-guardrails"
    component: self-explanation-prompt
    data:
      prompt: "Design a layered safety model for a coding agent that will be used by a 50-person engineering team. The agent needs to edit production code, run tests, and push to GitHub. What layers would you implement, and in what order do they activate?"
      expert_answer: "Layer 1 (Default-deny): Agent starts with zero access; only designated repositories and approved CLI commands are available. Layer 2 (RBAC): Junior developers' agents cannot push to main branch or modify infrastructure code; senior developers' agents have broader scope. Layer 3 (HITL): All production deployments require human approval; test runs are pre-approved. Layer 4 (Guardrails): Input validation rejects prompts requesting credential access or destructive operations; output validation scans generated code for known vulnerability patterns. Layer 5 (Sandboxing): OS-level filesystem and network isolation constraining the agent to designated directories. Each layer activates independently -- sandboxing is always on, RBAC checks fire on every action, HITL triggers on configured sensitive operations, and guardrails validate every input/output pair."

  # --- Concept Checks: Failure Modes ---
  - after: "silent-failures"
    component: quiz
    variant: concept-check
    data:
      question: "An agent edits a file that does not exist, then creates it with hallucinated content. Which failure mode is this?"
      choices:
        - "Context exhaustion"
        - "Hallucination cascade"
        - "Resource exhaustion"
        - "Silent failure"
      correct: 1
      explanation: "This is a hallucination cascade: the agent hallucinates a fact (the file path), acts on it (the edit fails), attempts recovery (creates the file), and now the codebase contains spurious content. The initial hallucination compounds into increasingly divergent state."

  - after: "silent-failures"
    component: quiz
    variant: concept-check
    data:
      question: "At Opus 4.6 output pricing, an uncontrolled agent at maximum Tier 4 rate limits would cost approximately how much per hour?"
      choices:
        - "$120/hour"
        - "$600/hour"
        - "$1,200/hour"
        - "$5,000/hour"
      correct: 2
      explanation: "At $25/MTok output pricing and ~800K output tokens per minute at Tier 4 rate limits, that is approximately $1,200 per hour. Organizations running multiple parallel agent sessions multiply this further. This is why production deployments must implement token budgets, time limits, and cost caps."

  # --- Section Review: Failure Modes ---
  - after: "silent-failures"
    component: quiz
    variant: section-review
    data:
      question: "Which failure mode is described as 'the most dangerous'?"
      choices:
        - "Hallucination cascades"
        - "Context exhaustion"
        - "Resource exhaustion"
        - "Silent failures"
      correct: 3
      explanation: "Silent failures are the most dangerous because the agent completes the task, reports success, but has produced subtly incorrect results. A test that passes because it tests the wrong thing, or a refactor that introduces a logic error the test suite does not cover. This is why human review of agent output remains essential."

  - after: "silent-failures"
    component: quiz
    variant: section-review
    data:
      question: "What mitigates context exhaustion in Claude Code?"
      choices:
        - "Increasing the model size"
        - "Auto-compaction -- summarizing earlier context"
        - "Reducing the number of tools available"
        - "Switching to a different model"
      correct: 1
      explanation: "Claude Code's auto-compaction mitigates context exhaustion by summarizing earlier context when the window fills. However, compacted summaries inevitably lose detail, which can lead to repetitive actions and forgotten constraints. See Module 02 for full compaction mechanics."

  - after: "silent-failures"
    component: quiz
    variant: section-review
    data:
      question: "What production safeguards should be implemented against resource exhaustion?"
      choices:
        - "Only use the cheapest model"
        - "Disable all tools"
        - "Token budgets, time limits, and cost caps"
        - "Run agents only during business hours"
      correct: 2
      explanation: "Token budgets, time limits, and cost caps are the three standard safeguards against resource exhaustion. A coding agent in an infinite retry loop or a browser agent clicking through pagination indefinitely can consume thousands of dollars without these controls."

  # --- Module Assessment (after Key Takeaways) ---
  - after: "key-takeaways"
    component: quiz
    variant: module-assessment
    data:
      question: "Name the five steps in the canonical agent loop."
      choices:
        - "Read, Write, Test, Deploy, Monitor"
        - "Gather, Plan, Act, Verify, Loop"
        - "Input, Process, Output, Validate, Store"
        - "Observe, Orient, Decide, Act, Assess"
      correct: 1
      explanation: "The canonical agent cycle is: Gather context, Plan (reason about actions), Act (invoke tools), Verify (check results), Loop (return to step 1 if goal not met). This is not a theoretical framework -- it is the literal execution model used by Claude Code, Codex, Jules, and other production agents."

  - after: "key-takeaways"
    component: quiz
    variant: module-assessment
    data:
      question: "What distinguishes an agent from a chatbot?"
      choices:
