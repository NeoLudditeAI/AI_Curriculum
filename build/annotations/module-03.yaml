  # === ROUND 7 DIAGRAMS ===

  # Figure M03-1: Gather-Act-Verify Loop
  - after: "how-agents-work-the-core-architecture"
    component: diagram
    variant: mermaid
    data:
      id: "m03-1"
      title: "The Gather-Act-Verify Agent Loop"
      alt: "Circular flow diagram showing the five-step agent architecture used by all production single-agent systems. Step 1, Gather: the agent reads relevant context such as codebases, web pages, file systems, or databases to understand current state. Platform implementations include Claude Code's Read tool, Codex sandbox filesystem access, and Jules GitHub repository access. Step 2, Plan: the agent reasons about what actions to take next, using extended thinking in Claude models or implicit reasoning in others. Step 3, Act: the agent invokes tools — editing files, running commands, clicking buttons, or calling APIs — through function calling or MCP connections. Step 4, Verify: the agent checks whether the action succeeded by re-reading files, running tests, or inspecting output. Claude Code's 84% reduction in permission prompts comes from verified autonomous operation within sandbox boundaries. Step 5, Loop Decision: if the goal is met, the agent completes; otherwise it returns to Gather with updated context. This is the literal execution model, not a theoretical framework."
      source: |
        graph TD
          G["1. GATHER<br/>Read context: codebase,<br/>web pages, files, databases"]
          P["2. PLAN<br/>Reason about next actions<br/>Extended thinking / implicit"]
          A["3. ACT<br/>Invoke tools: edit files,<br/>run commands, call APIs"]
          V["4. VERIFY<br/>Check results: re-read files,<br/>run tests, inspect output"]
          L{"5. LOOP<br/>Goal met?"}

          G --> P
          P --> A
          A --> V
          V --> L
          L -->|"No — continue"| G
          L -->|"Yes — complete"| Done["Task Complete"]

