        - "Agents have longer context windows"
        - "Tool use -- the ability to take actions, not just generate text"
        - "Agents are always more expensive"
      correct: 2
      explanation: "An agent without tools is just a chatbot that talks to itself. Tool use -- invoking functions, editing files, running commands, calling APIs -- is what separates an agent from a language model. This is the foundational architectural distinction."

