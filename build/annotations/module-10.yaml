  # ── Cross-module integration questions ─────────────────────────────────
  - after: "key-takeaways"
    component: quiz
    variant: module-assessment
    data:
      question: "Trace MCP's role across the curriculum: Module 00 introduced it as a key battleground, Module 06 covered the protocol in depth, and this module describes it as an ecosystem bridge. What makes MCP uniquely positioned as a hedge against platform lock-in?"
      choices: ["It is the cheapest integration option", "It is model-agnostic -- the same MCP server works with Claude, ChatGPT, Gemini, and open-source models, making integration investments portable", "It only works with Anthropic products", "It replaces the need for APIs"]
      correct: 1
      explanation: "MCP's value as a hedge comes from its model-agnosticism. A single MCP server providing database access, for example, works identically whether the client is Claude, ChatGPT, Gemini, or a local Llama instance. Anthropic's donation to the Linux Foundation's Agentic AI Foundation cemented this neutrality. With 19,700+ servers and 97M+ SDK downloads, the ecosystem has critical mass. This means integration investments are portable across the open-closed divide."

  - after: "key-takeaways"
    component: quiz
    variant: module-assessment
    data:
      question: "Using Module 09's pricing data and this module's open-vs-closed analysis, which argument BEST supports a company switching from Claude's API to a self-hosted Llama model?"
      choices: ["Llama models are always higher quality than Claude", "The company processes millions of classification tasks monthly where the 87% cost savings of open models outweigh the agentic capability gap, and they have the infrastructure team to manage self-hosted deployment", "Open models have better enterprise governance", "Self-hosted models have larger context windows"]
      correct: 1
      explanation: "The strongest case for switching combines Module 09's cost analysis (model selection is the biggest lever, 60-90% savings) with this module's open-closed dynamics (87% cheaper inference, full customization). However, the switch only makes sense when: (a) task complexity matches open model capabilities (classification, not frontier reasoning), (b) the organization has infrastructure expertise for self-hosted deployment, and (c) the governance gap (Module 05: OpenClaw has no enterprise governance) is acceptable. Self-hosted Llama does NOT have larger context windows or better governance than closed platforms."

  - after: "key-takeaways"
    component: quiz
    variant: module-assessment
    data:
      question: "Module 03 introduced the gather-act-verify loop. Module 04 extended it to multi-agent delegation. This module adds enterprise governance. Which description best captures the complete lifecycle of an enterprise agent action?"
      choices: ["Gather context, act, verify results", "Request approval, gather context, act, log the result", "Gather context, check permissions (governance), act within sandbox, verify results, log to audit trail (governance), route for human review if high-risk (EU AI Act compliance)", "Execute action, then check if it was allowed"]
      correct: 2
      explanation: "The complete lifecycle integrates Module 03 (gather-act-verify), Module 04 (delegation and context isolation), and Module 10 (enterprise governance). Before acting, the agent must pass governance permission checks. During action, sandboxing constrains scope. After action, results are verified AND logged to audit trails. For high-risk actions under the EU AI Act, human review gates must interrupt the delegation chain before irreversible actions execute. Governance wraps around the technical loop, not after it."

  - after: "key-takeaways"
    component: quiz
    variant: module-assessment
    data:
      question: "If Apple announces LLM Siri at WWDC 2026, which curriculum modules would require the most significant updates?"
      choices: ["Module 03 (agents) and Module 06 (MCP) only", "Module 01 (models), Module 08 (consumer comparison), and Module 10 (on-device AI)", "Module 09 (APIs) and Module 07 (skills) only", "No modules would need updates"]
      correct: 1
      explanation: "LLM Siri would primarily impact: Module 01 (Apple's models would enter the model comparison), Module 08 (a fifth major consumer AI platform reshapes all comparison tables), and Module 10 (on-device AI capabilities and Apple Intelligence expansion). Module 03 could also be affected if Siri gains agentic capabilities. The Event Impact Matrix in this module identifies WWDC as most affecting Modules 01, 08, and 10."

  # ── Capstone Decision Scenario (self-explanation) ──────────────────────
  - after: "key-takeaways"
    component: self-explanation-prompt
    data:
      prompt: "You are the AI strategy advisor for a European healthcare company (500 employees, 3 countries, GDPR + health data regulations). They need to deploy AI across clinical documentation, patient scheduling, research literature review, and internal knowledge management. Budget: $50K/year. Design the architecture using concepts from the entire curriculum: platform selection, agent architecture, integration strategy, governance, model selection per use case, cost optimization, and frontier considerations."
      expert_answer: "This is the full curriculum capstone. A model answer is provided in reference/research/capstone-answers/full-capstone.md. Key elements: (1) Platform: Azure OpenAI for HIPAA/GDPR compliance with VNet private networking (Module 09), supplemented by Anthropic for research quality. (2) Models: On-device or PCC for patient-facing scheduling (privacy-critical, Module 10), Opus/Sonnet for research summarization (Module 01), Haiku for classification tasks. (3) Agents: Multi-agent for compliance workflows with human-in-the-loop gates for EU AI Act (Modules 03-04). (4) Integration: MCP servers for internal knowledge base and regulatory document store (Module 06). (5) Governance: Agent 365 for centralized monitoring and compliance (Module 10). (6) Cost: Model tiering + caching + batch processing to stay within $50K/year (Module 09). See the full capstone answer document for detailed architecture and budget breakdown."

