  # === ROUND 7 DIAGRAMS ===

  # Figure M02-1: Context Window Layers
  - after: "context-windows-sizes-pricing-and-practical-limits"
    component: diagram
    variant: mermaid
    data:
      id: "m02-1"
      title: "Context Window Layers: From Persistent to Ephemeral"
      alt: "Layered diagram showing the five conceptual layers of a context window, arranged from innermost (most persistent) to outermost (most ephemeral). Layer 1 at the center is Identity — the system prompt and custom instructions, which are permanent and always survive compaction. Layer 2 is Knowledge — RAG-injected documents, uploaded files, and reference data, persistent per-session or cached. Layer 3 is Memory — cross-session facts from Claude Memory, ChatGPT Saved Memories, or Gemini Personal Intelligence, updated asynchronously. Layer 4 is Task — the current goal, tool results, and intermediate work products, ephemeral within the current task. Layer 5 at the outermost ring is Conversation — the most recent user and assistant turns, highly ephemeral and first to be compacted. Token budgets range from 1-5K for identity to 200-500K for conversation history."
      source: |
        graph TD
          L5["Layer 5: Conversation<br/>Recent user + assistant turns<br/>Ephemeral — first to compact<br/>~200-500K tokens"]
          L4["Layer 4: Task<br/>Current goal · Tool results<br/>Ephemeral within task<br/>~50-200K tokens"]
          L3["Layer 3: Memory<br/>Cross-session facts<br/>Claude Memory · ChatGPT Saved · Gemini PI<br/>Updated async · ~5-20K tokens"]
          L2["Layer 2: Knowledge<br/>RAG chunks · Uploaded files<br/>Per-session or cached<br/>~50-300K tokens"]
          L1["Layer 1: Identity<br/>System prompt · Custom instructions<br/>Permanent — always survives compaction<br/>~1-5K tokens"]

          L5 --> L4
          L4 --> L3
          L3 --> L2
          L2 --> L1

  # Figure M02-2: RAG Pipeline Architecture
  - after: "rag-retrieval-augmented-generation"
    component: diagram
    variant: mermaid
    data:
      id: "m02-2"
      title: "RAG Pipeline Architecture: Naive and Advanced Patterns"
      alt: "Process flow diagram showing the three-stage RAG pipeline. Stage 1 (Indexing): documents are split into chunks of 256-1024 tokens, each chunk is converted to a vector embedding, and embeddings are stored in a vector database such as Pinecone, Weaviate, Chroma, or pgvector. Stage 2 (Retrieval): a user query is embedded, compared against indexed chunks using cosine similarity, and the top-k most relevant chunks (typically 3-10) are retrieved. Stage 3 (Generation): retrieved chunks plus the original query are injected into the LLM context window, and the model generates a grounded response. An Advanced RAG extension adds pre-retrieval processing (query rewriting, query expansion, HyDE hypothetical document embeddings) before the retrieval stage, and post-retrieval processing (cross-encoder re-ranking, chunk filtering, iterative retrieval) after retrieval and before generation."
      source: |
        graph LR
          subgraph Indexing["Stage 1: Indexing"]
            I1["Documents"] --> I2["Split into chunks<br/>256-1,024 tokens"]
            I2 --> I3["Generate embeddings"]
            I3 --> I4["Store in Vector DB<br/>Pinecone · Weaviate<br/>Chroma · pgvector"]
          end

          subgraph Retrieval["Stage 2: Retrieval"]
            R1["User Query"] --> R2["Embed query"]
            R2 --> R3["Cosine similarity<br/>search"]
            R3 --> R4["Top-k chunks<br/>typically 3-10"]
          end

          subgraph Generation["Stage 3: Generation"]
            G1["Retrieved chunks<br/>+ original query"] --> G2["LLM context<br/>window"]
            G2 --> G3["Grounded<br/>response"]
          end

          I4 -.->|"indexed"| R3
          R4 --> G1

          subgraph Advanced["Advanced RAG Extensions"]
            Pre["Pre-retrieval<br/>Query rewriting<br/>Query expansion<br/>HyDE embeddings"]
            Post["Post-retrieval<br/>Cross-encoder re-ranking<br/>Chunk filtering<br/>Iterative retrieval"]
          end

          Pre -.->|"before"| R1
          R4 -.->|"then"| Post
          Post -.->|"refined chunks"| G1

  # Figure M02-5: RAG Decision Framework (Decision Tree)
  - after: "when-to-use-rag-decision-framework"
    component: diagram
    variant: decision-tree
    data:
      id: "m02-5"
      title: "RAG Decision Framework"
      alt: "Decision tree for choosing between context injection, RAG variants, and fine-tuning based on knowledge base size, update frequency, and query volume."
      config:
        root:
          question: "How large is your knowledge base?"
          branches:
            - label: "< 10K tokens"
              terminal:
                recommendation: "Prompt Engineering"
                rationale: "Instructions, formatting rules, and behavioral constraints fit directly in the prompt with minimal setup cost."
            - label: "10K - 500K tokens"
              question: "How often does the knowledge change?"
              branches:
                - label: "Rarely (monthly+)"
                  question: "What is your query volume?"
                  branches:
                    - label: "Low-medium (< 200/day)"
                      terminal:
                        recommendation: "Long Context + Caching"
                        rationale: "Fits within context window. Prompt caching amortizes input cost at low-medium volume. Minimal setup."
                    - label: "High (200+/day)"
                      terminal:
                        recommendation: "RAG (Naive)"
                        rationale: "At high volume, RAG's per-query savings outweigh setup cost even for sub-500K knowledge bases."
                - label: "Frequently (weekly or more)"
                  terminal:
                    recommendation: "RAG (Naive)"
                    rationale: "Frequent updates make context injection impractical — you'd need to rebuild cached prompts constantly. RAG indexes update independently."
            - label: "500K+ tokens"
              question: "Do queries need multi-hop reasoning or cross-document synthesis?"
              branches:
                - label: "No — single-fact lookups"
                  terminal:
                    recommendation: "RAG (Naive)"
                    rationale: "Simple top-k retrieval handles single-fact queries efficiently. Exceeds context window limits, ruling out direct injection."
                - label: "Yes — complex queries"
                  question: "Is sub-second latency required?"
                  branches:
                    - label: "Yes"
                      terminal:
                        recommendation: "RAG (Advanced) + Caching"
                        rationale: "Pre-computed re-ranking and cached frequent queries balance quality with latency. Use query expansion and hybrid search."
                    - label: "No"
                      terminal:
                        recommendation: "RAG (Advanced / Agentic)"
                        rationale: "Agentic RAG with iterative retrieval, re-ranking, and follow-up queries maximizes recall for complex questions."
            - label: "Need behavior encoded in weights"
              question: "Is your query volume very high (1000+/day)?"
              branches:
                - label: "Yes"
                  terminal:
                    recommendation: "Fine-tuning"
                    rationale: "Specialized terminology, output formats, or behavioral patterns that must hold across all queries without prompt space. Retraining cost justified at very high volume."
                - label: "No"
                  terminal:
                    recommendation: "RAG + Few-shot Prompting"
                    rationale: "At lower volumes, RAG with few-shot examples in the prompt achieves similar behavioral consistency without retraining cost."
