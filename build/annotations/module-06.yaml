  # --- Diagram: M06-4 Three Primitives ---
  - after: "3-core-primitives"
    component: diagram
    variant: mermaid
    data:
      id: "m06-4"
      title: "MCP Three Primitives: Control Models"
      alt: "Three-column diagram showing MCP's three primitive types and who controls each. Left column: Tools are model-controlled, meaning the AI model decides when to invoke them based on conversation context. Examples include create_issue and search_code. Middle column: Resources are application-controlled, meaning the host application decides when to access data via URI-based addressing. Examples include database schemas and file contents. Right column: Prompts are user-selected, meaning the human chooses reusable templates via slash commands or menus. Examples include code_review and summarize templates."
      source: |
        graph TD
          subgraph Tools["Tools"]
            T_Control["Model-Controlled"]
            T_Desc["AI decides when to invoke"]
            T_Ex1["create_issue"]
            T_Ex2["search_code"]
            T_Ex3["list_pull_requests"]
            T_Control --> T_Desc
            T_Desc --> T_Ex1
            T_Desc --> T_Ex2
            T_Desc --> T_Ex3
          end

          subgraph Resources["Resources"]
            R_Control["Application-Controlled"]
            R_Desc["Host app exposes data"]
            R_Ex1["database://users/schema"]
            R_Ex2["file:///path/to/doc.md"]
            R_Ex3["resource://config"]
            R_Control --> R_Desc
            R_Desc --> R_Ex1
            R_Desc --> R_Ex2
            R_Desc --> R_Ex3
          end

          subgraph Prompts["Prompts"]
            P_Control["User-Selected"]
            P_Desc["Human chooses templates"]
            P_Ex1["code_review"]
            P_Ex2["summarize"]
            P_Ex3["debug_error"]
            P_Control --> P_Desc
            P_Desc --> P_Ex1
            P_Desc --> P_Ex2
            P_Desc --> P_Ex3
          end
