          end

  # ── Figure M01-4: Model Selection Decision Tree (Interactive) ────────
  - after: "model-selection-framework"
    component: diagram
    variant: decision-tree
    data:
      id: "m01-4"
      title: "Model Selection Decision Tree"
      alt: "Interactive decision tree for choosing an AI model based on your primary task. Starts by identifying your task type (coding, reasoning, multimodal, creative generation, or budget-constrained bulk), then branches through specifics like scale, modality needs, latency requirements, and cost sensitivity to recommend specific models with pricing from Anthropic, OpenAI, and Google lineups as of March 2026."
      config:
        root:
          question: "What is your primary task?"
          branches:
            - label: "Coding and software engineering"
              question: "What scale of coding work?"
              branches:
                - label: "Complex multi-file, agentic"
                  terminal:
                    model: "Claude Opus 4.6"
                    price: "$5/$25 per MTok"
                    rationale: "Top SWE-bench (80.8%), 1M context for full-repo comprehension, 128K max output."
                - label: "Moderate single-file tasks"
                  terminal:
                    model: "Claude Sonnet 4.6"
                    price: "$3/$15 per MTok"
                    rationale: "Near-Opus coding quality at 40% lower cost. Strong instruction following."
                - label: "Fast triage and classification"
                  terminal:
                    model: "Haiku 4.5"
                    price: "$1/$5 per MTok"
                    rationale: "73.3% SWE-bench Verified. Fastest Claude model for routing and simple code tasks."
            - label: "Complex reasoning (math, analysis)"
              question: "How hard is the problem?"
              branches:
                - label: "Hardest problems (competition-level)"
                  question: "Which reasoning approach?"
                  branches:
                    - label: "Maximum compute budget"
                      terminal:
                        model: "o3-pro"
                        price: "$20/$80 per MTok"
                        rationale: "Highest reasoning compute available. Best for problems where no other model succeeds."
                    - label: "Efficient math and code reasoning"
                      terminal:
                        model: "o4-mini"
                        price: "Varies by effort level"
                        rationale: "AIME 2025 99.5% pass@1. Efficient RL-trained reasoning for math and coding."
                    - label: "Parallel hypothesis evaluation"
                      terminal:
