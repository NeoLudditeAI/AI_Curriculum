            AH["Haiku 4.5<br/>$1 / $5 MTok<br/>200K context"] --> AS["Sonnet 4.6<br/>$3 / $15 MTok<br/>1M context"]
            AS --> AO["Opus 4.6<br/>$5 / $25 MTok<br/>1M context · 128K output"]
