  # ── Integration question: Gather-act-verify and API architecture ───────
  - after: "key-takeaways"
    component: quiz
    variant: module-assessment
    data:
      question: "How does the explicit tool-use cycle in Anthropic's Messages API relate to the gather-act-verify loop from Module 03?"
      choices: ["They are unrelated concepts", "The tool-use cycle IS the gather-act-verify loop at the API level: the model gathers context, acts via tool_use blocks, and the developer verifies tool results before continuing", "The gather-act-verify loop only applies to multi-agent systems", "Anthropic's API skips the verify step"]
      correct: 1
      explanation: "Anthropic's explicit tool-use cycle maps directly to the gather-act-verify loop from Module 03. The model gathers context (user message + system prompt), acts (returns tool_use blocks), and the developer verifies (executes the tool, validates the result, sends tool_result back). The developer's control over this loop is why Anthropic's architecture is favored in production agent systems where verification and observability are critical."

  # ── Integration question: Multi-agent API cost estimation ──────────────
  - after: "key-takeaways"
    component: quiz
    variant: module-assessment
    data:
      question: "A multi-agent system (Module 04) assigns Opus 4.6 to a lead agent, Sonnet 4.6 to 3 worker agents, and Haiku 4.5 to a triage agent. The system processes 100,000 messages/month with an average of 2,000 input tokens and 500 output tokens per message. The lead handles 10%, workers handle 60%, and triage handles 30%. Using Anthropic's pricing, which estimate is closest to the monthly API cost?"
      choices: ["$200-$400", "$500-$800", "$1,200-$1,800", "$3,000-$5,000"]
      correct: 2
      explanation: "Lead (Opus, 10K msgs): input 20M tokens x $5/MTok = $100, output 5M x $25/MTok = $125. Workers (Sonnet, 60K msgs): input 120M x $3/MTok = $360, output 30M x $15/MTok = $450. Triage (Haiku, 30K msgs): input 60M x $1/MTok = $60, output 15M x $5/MTok = $75. Total: ~$1,170. With caching on repeated system prompts, this could drop to $800-$1,000. The ~$1,200-$1,800 range accounts for overhead and variable output lengths."

  # ── Closing Decision Scenario ──────────────────────────────────────────
  - after: "key-takeaways"
    component: self-explanation-prompt
    data:
      prompt: "You are reviewing AI costs for a SaaS product using the Anthropic Messages API. Current monthly bill: $12,000. Architecture: 500,000 calls/month, all using Opus 4.6, 8,000-token stable system prompt, 2,000-token average user input, 1,500-token average output, no caching, all synchronous. 60% are classification, 30% summarization, 10% complex reasoning. Design an optimization strategy and estimate the new monthly cost."
      expert_answer: "Step 1 -- Model selection: Route 60% (300K calls) to Haiku 4.5 for classification, 30% (150K) to Sonnet 4.6 for summarization, keep 10% (50K) on Opus 4.6 for complex reasoning. Step 2 -- Enable prompt caching: The 8K system prompt is identical across all calls. Anthropic's 90% cache discount applies to 8K tokens per call. Step 3 -- Batch the classification calls: Classification results are not latency-sensitive, qualifying for the 50% batch discount. Step 4 -- Combined estimated cost: Haiku classification (batched + cached): ~$150/mo. Sonnet summarization (cached): ~$900/mo. Opus reasoning (cached): ~$750/mo. Total: ~$1,800/mo -- an 85% reduction from $12,000. The largest savings came from model selection (moving 60% off Opus), followed by caching (8K stable prompt), then batching (offline classification)."

